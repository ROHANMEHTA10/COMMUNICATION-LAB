<!DOCTYPE html>
<html>
<head>
<title>AI Chat</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #0d1117;
  color: white;
  display: flex;
  flex-direction: column;
  height: 100vh;
}

.header {
  padding: 15px;
  background: #161b22;
  text-align: center;
  font-weight: bold;
}

.chat-box {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
}

.message {
  padding: 12px;
  margin: 10px 0;
  border-radius: 10px;
  max-width: 70%;
}

.user {
  background: #238636;
  margin-left: auto;
}

.ai {
  background: #161b22;
}

.input-box {
  display: flex;
  padding: 10px;
  background: #161b22;
}

input {
  flex: 1;
  padding: 12px;
  border: none;
  outline: none;
}

button {
  padding: 12px;
  background: #238636;
  border: none;
  color: white;
  cursor: pointer;
}

.typing {
  opacity: 0.6;
  font-style: italic;
}
</style>
</head>

<body>

<div class="header">AI Trainer 🤖</div>

<div class="chat-box" id="chat">
  <div class="message ai">Hey 👋 Tell me your name</div>
</div>

<div class="input-box">
  <input id="input" placeholder="Type..." />
  <button onclick="send()">Send</button>
</div>

<script>
let userName = "";
let userWork = "";
let userInterest = "";
let introDone = false;

function cleanText(text) {
  return text.toLowerCase().replace(/[^a-z ]/g, "").trim();
}

// 🧠 BETTER NAME EXTRACTION
function extractName(text) {
  let t = text.toLowerCase();

  if (t.includes("my name is")) {
    return text.toLowerCase().split("my name is")[1].trim().split(" ")[0];
  }

  if (t.includes("i am")) {
    let name = text.toLowerCase().split("i am")[1].trim().split(" ")[0];
    if (name === "a" || name === "an") return ""; // prevent "i am a student"
    return name;
  }

  let first = text.split(" ")[0].toLowerCase();

  // ❌ avoid wrong names
  if (["my", "i", "am"].includes(first)) return "";

  return first;
}

function send() {
  let input = document.getElementById("input");
  let text = input.value.trim();
  let lower = cleanText(text);

  if (!text) return;

  let chat = document.getElementById("chat");

  chat.innerHTML += `<div class="message user">${text}</div>`;
  input.value = "";

  let typing = document.createElement("div");
  typing.className = "message ai typing";
  typing.innerText = "Typing...";
  chat.appendChild(typing);

  chat.scrollTop = chat.scrollHeight;

  setTimeout(() => {
    typing.remove();

    let reply = "";

    // 🚫 BAD LANGUAGE
    if (lower.includes("fuck") || lower.includes("abuse")) {
      reply = "😅 Chill bro, keep it respectful.";
    }

    // 🧠 STEP 1: NAME
    else if (!userName) {
      let name = extractName(text);

      if (!name) {
        reply = "😄 I didn’t catch your name properly. Try like: 'My name is Rohan'";
      } else {
        userName = name;
        reply = `Nice to meet you ${userName} 😊 What do you do?`;
      }
    }

    // 🧠 STEP 2: WORK
    else if (!userWork) {
      if (lower === userName.toLowerCase()) {
        reply = "😅 That's your name again. Tell me what you do.";
      } else {
        userWork = text;
        reply = `Nice 👍 And what are your interests?`;
      }
    }

    // 🧠 STEP 3: INTEREST
    else if (!userInterest) {
      if (lower === userName.toLowerCase()) {
        reply = "😅 That’s not an interest. Tell me what you enjoy.";
      } else {
        userInterest = text;
        introDone = true;

        reply = `
🔥 Your final intro:<br><br>
Hi, I am ${userName}. I am ${userWork}. I like ${userInterest}.<br><br>

✅ Good job!<br>
You can now chat freely 😄
        `;
      }
    }

    // 💬 SMART CHAT MODE (IMPORTANT)
    else if (introDone) {

      if (lower.includes("hi") || lower.includes("hello")) {
        reply = `Hey ${userName} 👋 what's up?`;
      }

      else if (lower.includes("how are you")) {
        reply = "I'm good 😄 What about you?";
      }

      else if (lower.includes("nervous")) {
        reply = "Totally normal bro 💪 Even confident people feel nervous sometimes.";
      }

      else if (lower.includes("confidence")) {
        reply = "Confidence = practice + consistency 🔥 Speak daily and it will grow.";
      }

      else if (lower.includes("crush")) {
        reply = "😏 Oho... want help talking to your crush?";
      }

      else if (text.length > 25) {
        reply = "🔥 That was a solid sentence! You're improving.";
      }

      else {
        const replies = [
          `Nice 👍 ${userName}, tell me more.`,
          `Hmm interesting 😄`,
          `Good one 💪`,
          `Haha okay 😂`,
          `You're getting better bro 🔥`
        ];

        reply = replies[Math.floor(Math.random() * replies.length)];
      }
    }

    chat.innerHTML += `<div class="message ai">${reply}</div>`;
    chat.scrollTop = chat.scrollHeight;

  }, 600);
}

// ENTER KEY
document.getElementById("input").addEventListener("keydown", function(e) {
  if (e.key === "Enter") {
    e.preventDefault();
    send();
  }
});
</script>
</body>
</html>
