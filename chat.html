<!DOCTYPE html>
<html>
<head>
<title>AI Chat</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #0d1117;
  color: white;
  display: flex;
  flex-direction: column;
  height: 100vh;
}

.header {
  padding: 15px;
  background: #161b22;
  text-align: center;
  font-weight: bold;
}

.chat-box {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
}

.message {
  padding: 12px;
  margin: 10px 0;
  border-radius: 10px;
  max-width: 70%;
}

.user {
  background: #238636;
  margin-left: auto;
}

.ai {
  background: #161b22;
}

.input-box {
  display: flex;
  padding: 10px;
  background: #161b22;
}

input {
  flex: 1;
  padding: 12px;
  border: none;
  outline: none;
}

button {
  padding: 12px;
  background: #238636;
  border: none;
  color: white;
  cursor: pointer;
}

.typing {
  opacity: 0.6;
  font-style: italic;
}
</style>
</head>

<body>

<div class="header">AI Trainer 🤖</div>

<div class="chat-box" id="chat">
  <div class="message ai">Hey 👋 Tell me your name</div>
</div>

<div class="input-box">
  <input id="input" placeholder="Type..." />
  <button onclick="send()">Send</button>
</div>

<script>
let userName = "";
let userWork = "";
let userInterest = "";

function cleanText(text) {
  return text.toLowerCase().replace(/[^a-z ]/g, "").trim();
}

function extractName(text) {
  let t = text.toLowerCase();

  if (t.includes("my name is")) {
    return text.split("my name is")[1].trim().split(" ")[0];
  }

  if (t.includes("i am")) {
    return text.split("i am")[1].trim().split(" ")[0];
  }

  return text.split(" ")[0];
}

function send() {
  let input = document.getElementById("input");
  let text = input.value.trim();
  let lower = cleanText(text);

  if (!text) return;

  let chat = document.getElementById("chat");

  // USER MESSAGE
  chat.innerHTML += `<div class="message user">${text}</div>`;
  input.value = "";

  // TYPING
  let typing = document.createElement("div");
  typing.className = "message ai typing";
  typing.innerText = "Typing...";
  chat.appendChild(typing);

  chat.scrollTop = chat.scrollHeight;

  setTimeout(() => {
    typing.remove();

    let reply = "";

    // 🚫 BAD WORD FILTER
    if (lower.includes("fuck") || lower.includes("abuse") || lower.includes("stupid")) {
      reply = "😅 Bro… keep it clean. Let’s focus on learning.";
    }

    // 🧠 NAME
    else if (!userName) {
      userName = extractName(text);
      reply = `Nice to meet you ${userName} 😊 What do you do? (student/job)`;
    }

    // 💼 WORK VALIDATION
    else if (!userWork) {
      if (lower === userName.toLowerCase()) {
        reply = "😅 That looks like your name again. Tell me your work (student / job / etc)";
      } else {
        userWork = text;
        reply = `Good 👍 What are your interests? (football, music, gym etc)`;
      }
    }

    // 🎯 INTEREST VALIDATION
    else if (!userInterest) {
      if (lower === userName.toLowerCase() || lower === userWork.toLowerCase()) {
        reply = "😅 That doesn't look like an interest. Tell me something you enjoy.";
      } else {
        userInterest = text;

        reply = `
🔥 Your final intro:<br><br>
Hi, I am ${userName}. I am ${userWork}. I like ${userInterest}.<br><br>
Say it confidently 💪
        `;
      }
    }

    // 🧠 SMART CHAT
    else {
      if (lower.includes("what") || lower.includes("why")) {
        reply = "I am helping you practice communication 😄 Stay on track.";
      }
      else if (lower.includes("again")) {
        reply = `Repeat this:<br>Hi, I am ${userName}. I am ${userWork}. I like ${userInterest}.`;
      }
      else {
        reply = `Nice 👍 ${userName}, try speaking your intro again confidently.`;
      }
    }

    chat.innerHTML += `<div class="message ai">${reply}</div>`;
    chat.scrollTop = chat.scrollHeight;

  }, 700);
}

// ENTER KEY FIX
document.getElementById("input").addEventListener("keydown", function(e) {
  if (e.key === "Enter") {
    e.preventDefault();
    send();
  }
});
</script>

</body>
</html>
