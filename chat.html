<!DOCTYPE html>
<html>
<head>
<title>AI Trainer</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #0d1117;
  color: white;
  display: flex;
  flex-direction: column;
  height: 100vh;
}

.header {
  padding: 15px;
  background: #161b22;
  text-align: center;
  font-weight: bold;
}

.chat-box {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
}

.message {
  padding: 12px;
  margin: 10px 0;
  border-radius: 10px;
  max-width: 70%;
}

.user {
  background: #238636;
  margin-left: auto;
}

.ai {
  background: #161b22;
}

.input-box {
  display: flex;
  padding: 10px;
  background: #161b22;
}

input {
  flex: 1;
  padding: 12px;
  border: none;
  outline: none;
  border-radius: 6px;
}

button {
  padding: 12px;
  background: #238636;
  border: none;
  color: white;
  cursor: pointer;
  border-radius: 6px;
}

.typing {
  opacity: 0.6;
  font-style: italic;
}
</style>
</head>

<body>

<div class="header">AI Trainer 🤖</div>

<div class="chat-box" id="chat">
  <div class="message ai">Hey 👋 Tell me your name</div>
</div>

<div class="input-box">
  <input id="input" placeholder="Type..." />
  <button onclick="send()">Send</button>
</div>

<script>

let userName = "";
let userWork = "";
let userInterest = "";
let stage = "name";

// CLEAN
function clean(text) {
  return text.toLowerCase().trim();
}

// NAME EXTRACT
function getName(text) {
  let t = clean(text);

  if (t.includes("my name is")) return text.split("my name is")[1].trim().split(" ")[0];
  if (t.includes("i am")) return text.split("i am")[1].trim().split(" ")[0];

  return text.split(" ")[0];
}

// VALIDATION
function isValidName(text) {
  return text.length > 2 && !text.toLowerCase().includes("hi");
}

function isValidWork(text) {
  let t = clean(text);
  return !(t.includes("nothing") || t.length < 4);
}

function isValidInterest(text) {
  let t = clean(text);
  return !(t.includes("nothing") || t.includes("hate") || t.length < 3);
}

// SEND
function send() {

  let input = document.getElementById("input");
  let text = input.value.trim();
  if (!text) return;

  let chat = document.getElementById("chat");

  chat.innerHTML += `<div class="message user">${text}</div>`;
  input.value = "";

  let typing = document.createElement("div");
  typing.className = "message ai typing";
  typing.innerText = "Typing...";
  chat.appendChild(typing);

  setTimeout(() => {

    typing.remove();
    let reply = "";
    let lower = clean(text);

    // 🚫 BAD BEHAVIOR
    if (lower.includes("kill") || lower.includes("hate") || lower.includes("stupid")) {
      reply = "⚠️ This is not appropriate. Answer professionally like in an interview.";
    }

    // 🧠 NAME STAGE
    else if (stage === "name") {

      if (!isValidName(text)) {
        reply = "❌ That doesn’t sound like a proper name. Say: 'My name is Rohan'.";
      } else {
        userName = getName(text);
        stage = "work";
        reply = `✅ Nice to meet you, ${userName}. What do you do? (student / job)`;
      }
    }

    // 🧠 WORK STAGE
    else if (stage === "work") {

      if (!isValidWork(text)) {
        reply = "❌ That’s not a strong answer. Try: 'I am a student' or 'I am learning coding'.";
      } else {
        userWork = text;
        stage = "interest";
        reply = "👍 Good. Now tell me your interests (skills or hobbies).";
      }
    }

    // 🧠 INTEREST STAGE
    else if (stage === "interest") {

      if (!isValidInterest(text)) {
        reply = "❌ That’s not a good interest. Say something positive like football, gym, music.";
      } else {
        userInterest = text;
        stage = "complete";

        reply = `
🔥 Final Introduction:<br><br>
Hi, I am ${userName}. I am ${userWork}. I am interested in ${userInterest}.<br><br>

🎯 Feedback:<br>
✔ Clear structure<br>
✔ Good attempt<br>
👉 Try speaking confidently.<br><br>

Type <b>interview</b> to start real questions 🚀
        `;
      }
    }

    // 🎯 INTERVIEW MODE
    else if (stage === "complete") {

      if (lower.includes("interview")) {
        stage = "q1";
        reply = "🎤 Interview Q1: Why should we select you?";
      }

      else {
        reply = "👉 Type 'interview' to continue.";
      }
    }

    // 🧠 INTERVIEW Q1
    else if (stage === "q1") {

      if (text.length < 10) {
        reply = "❌ Too short. Give a proper answer with confidence.";
      } else {
        stage = "q2";
        reply = "👍 Good attempt. Q2: What are your strengths?";
      }
    }

    // 🧠 INTERVIEW Q2
    else if (stage === "q2") {

      if (text.length < 10) {
        reply = "❌ Not strong enough. Mention real strengths.";
      } else {
        stage = "done";
        reply = "🎉 Great! You completed basic interview practice. Keep improving 💪";
      }
    }

    chat.innerHTML += `<div class="message ai">${reply}</div>`;
    chat.scrollTop = chat.scrollHeight;

  }, 500);
}

// ENTER
document.getElementById("input").addEventListener("keydown", function(e) {
  if (e.key === "Enter") {
    e.preventDefault();
    send();
  }
});



  
</script>
</body>
</html>
