<script>
let userName = "";
let userWork = "";
let userInterest = "";

function send() {
  let input = document.getElementById("input");
  let text = input.value.trim();
  let lower = text.toLowerCase();

  if (text === "") return;

  let chat = document.getElementById("chat");

  // USER MESSAGE
  chat.innerHTML += `<div class="message user">${text}</div>`;
  input.value = "";

  // TYPING
  let typing = document.createElement("div");
  typing.className = "message ai typing";
  typing.innerText = "Typing...";
  chat.appendChild(typing);

  chat.scrollTop = chat.scrollHeight;

  setTimeout(() => {
    typing.remove();

    let reply = "";

    // 🚫 Safety filter
    if (lower.includes("abuse") || lower.includes("stupid") || lower.includes("idiot")) {
      reply = "😅 Bro chill… let's keep it respectful.";
    }

    // 🧠 SMART NAME DETECTION
    else if (!userName) {
      userName = text.split(" ")[0];
      reply = `Nice to meet you, ${userName} 😊<br>What do you do?`;
    }

    // 💼 WORK DETECTION
    else if (!userWork && !lower.includes(userName.toLowerCase())) {
      userWork = text;
      reply = `Got it 👍 So ${userName}, what do you enjoy doing? (hobbies/interests)`;
    }

    // 🎯 INTEREST DETECTION
    else if (!userInterest) {
      userInterest = text;

      reply = `
      🔥 Your final introduction:<br><br>
      Hi, I am ${userName}. I am ${userWork}. I like ${userInterest}.<br><br>
      Say it confidently 💪
      `;
    }

    // 💬 SMART NORMAL CHAT
    else {
      if (lower.includes("nervous")) {
        reply = "It's normal 😄 Everyone feels nervous. Practice daily and you'll improve.";
      }
      else if (lower.includes("how")) {
        reply = "Start simple 👍 Speak slowly, smile, and maintain eye contact.";
      }
      else if (lower.includes("intro")) {
        reply = `Try this:<br>Hi, I am ${userName}. I am ${userWork}. I like ${userInterest}.`;
      }
      else {
        reply = `Nice 👍 ${userName}, you're improving. Keep practicing daily 💪`;
      }
    }

    chat.innerHTML += `<div class="message ai">${reply}</div>`;
    chat.scrollTop = chat.scrollHeight;

  }, 700);
}

// ENTER KEY FIX
document.getElementById("input").addEventListener("keydown", function(e) {
  if (e.key === "Enter") {
    e.preventDefault();
    send();
  }
});
</script>
