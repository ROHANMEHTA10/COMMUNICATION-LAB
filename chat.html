<!DOCTYPE html>
<html>
<head>
<title>AI Chat</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #0d1117;
  color: white;
  display: flex;
  flex-direction: column;
  height: 100vh;
}

.header {
  padding: 15px;
  background: #161b22;
  text-align: center;
  font-weight: bold;
}

.chat-box {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
}

.message {
  padding: 12px;
  margin: 10px 0;
  border-radius: 10px;
  max-width: 70%;
}

.user {
  background: #238636;
  margin-left: auto;
}

.ai {
  background: #161b22;
}

.input-box {
  display: flex;
  padding: 10px;
  background: #161b22;
}

input {
  flex: 1;
  padding: 12px;
  border: none;
  outline: none;
}

button {
  padding: 12px;
  background: #238636;
  border: none;
  color: white;
  cursor: pointer;
}

.typing {
  opacity: 0.6;
  font-style: italic;
}
</style>
</head>

<body>

<div class="header">AI Trainer 🤖</div>

<div class="chat-box" id="chat">
  <div class="message ai">Hey 👋 Tell me your name</div>
</div>

<div class="input-box">
  <input id="input" placeholder="Type..." />
  <button onclick="send()">Send</button>
</div>

<script>
let userName = "";
let userWork = "";
let userInterest = "";
let introDone = false;

function cleanText(text) {
  return text.toLowerCase().replace(/[^a-z ]/g, "").trim();
}

function extractName(text) {
  let t = text.toLowerCase();

  if (t.includes("my name is")) {
    return text.split("my name is")[1].trim().split(" ")[0];
  }

  if (t.includes("i am")) {
    return text.split("i am")[1].trim().split(" ")[0];
  }

  return text.split(" ")[0];
}

function send() {
  let input = document.getElementById("input");
  let text = input.value.trim();
  let lower = cleanText(text);

  if (!text) return;

  let chat = document.getElementById("chat");

  chat.innerHTML += `<div class="message user">${text}</div>`;
  input.value = "";

  let typing = document.createElement("div");
  typing.className = "message ai typing";
  typing.innerText = "Typing...";
  chat.appendChild(typing);

  chat.scrollTop = chat.scrollHeight;

  setTimeout(() => {
    typing.remove();

    let reply = "";

    // 🚫 BAD LANGUAGE
    if (lower.includes("fuck") || lower.includes("abuse")) {
      reply = "😅 Keep it respectful bro.";
    }

    // 🧠 STEP 1: NAME
    else if (!userName) {
      userName = extractName(text);
      reply = `Nice to meet you ${userName} 😊 What do you do?`;
    }

    // 🧠 STEP 2: WORK
    else if (!userWork) {
      if (lower === userName.toLowerCase()) {
        reply = "😅 That’s your name again. Tell me your work.";
      } else {
        userWork = text;
        reply = `Good 👍 What are your interests?`;
      }
    }

    // 🧠 STEP 3: INTEREST
    else if (!userInterest) {
      if (lower === userName.toLowerCase()) {
        reply = "😅 That’s not an interest. Tell me what you like.";
      } else {
        userInterest = text;
        introDone = true;

        reply = `
🔥 Your final intro:<br><br>
Hi, I am ${userName}. I am ${userWork}. I like ${userInterest}.<br><br>

✅ Great job!<br>
Type <b>again</b> to practice<br>
Type <b>next</b> for next lesson 🚀
        `;
      }
    }

    // 🎯 AFTER INTRO COMPLETE
    else if (introDone) {

      if (lower.includes("again")) {
        userWork = "";
        userInterest = "";
        introDone = false;

        reply = "🔁 Let's try again! What do you do?";
      }

      else if (lower.includes("next")) {
        reply = "🚀 Moving to next lesson: Active Listening (coming soon)";
      }

      else if (text.length > 20) {
        reply = "🔥 Nice full sentence! Your confidence is improving 💪";
      }

      else {
        reply = "👍 Try speaking full introduction again or type 'next'";
      }
    }

    chat.innerHTML += `<div class="message ai">${reply}</div>`;
    chat.scrollTop = chat.scrollHeight;

  }, 600);
}

// ENTER KEY
document.getElementById("input").addEventListener("keydown", function(e) {
  if (e.key === "Enter") {
    e.preventDefault();
    send();
  }
});
</script>
</body>
</html>
