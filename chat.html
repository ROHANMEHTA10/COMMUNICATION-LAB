<!DOCTYPE html>
<html>
<head>
<title>AI Chat</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #0d1117;
  color: white;
  display: flex;
  flex-direction: column;
  height: 100vh;
}

.header {
  padding: 15px;
  background: #161b22;
  text-align: center;
  font-weight: bold;
}

.chat-box {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
}

.message {
  padding: 12px;
  margin: 10px 0;
  border-radius: 10px;
  max-width: 70%;
}

.user {
  background: #238636;
  margin-left: auto;
}

.ai {
  background: #161b22;
}

.input-box {
  display: flex;
  padding: 10px;
  background: #161b22;
}

input {
  flex: 1;
  padding: 12px;
  border: none;
  outline: none;
}

button {
  padding: 12px;
  background: #238636;
  border: none;
  color: white;
  cursor: pointer;
}

.typing {
  opacity: 0.6;
  font-style: italic;
}
</style>
</head>

<body>

<div class="header">AI Trainer 🤖</div>

<div class="chat-box" id="chat">
  <div class="message ai">Hey 👋 Tell me your name</div>
</div>

<div class="input-box">
  <input id="input" placeholder="Type..." />
  <button onclick="send()">Send</button>
</div>

<script>
let userName = "";
let userWork = "";
let userInterest = "";

function send() {
  let input = document.getElementById("input");
  let text = input.value.trim();
  let lower = text.toLowerCase();

  if (!text) return;

  let chat = document.getElementById("chat");

  chat.innerHTML += `<div class="message user">${text}</div>`;
  input.value = "";

  let typing = document.createElement("div");
  typing.className = "message ai typing";
  typing.innerText = "Typing...";
  chat.appendChild(typing);

  chat.scrollTop = chat.scrollHeight;

  setTimeout(() => {
    typing.remove();

    let reply = "";

    if (lower.includes("abuse") || lower.includes("stupid")) {
      reply = "😅 Be respectful bro.";
    }

    else if (!userName) {
      userName = text.split(" ")[0];
      reply = `Nice to meet you ${userName} 😊 What do you do?`;
    }

    else if (!userWork) {
      userWork = text;
      reply = `Good 👍 What are your interests?`;
    }

    else if (!userInterest) {
      userInterest = text;
      reply = `🔥 Intro:<br>Hi I am ${userName}, I am ${userWork}, I like ${userInterest}`;
    }

    else {
      reply = `Nice 👍 ${userName}, keep practicing`;
    }

    chat.innerHTML += `<div class="message ai">${reply}</div>`;
    chat.scrollTop = chat.scrollHeight;

  }, 600);
}

document.getElementById("input").addEventListener("keydown", function(e) {
  if (e.key === "Enter") {
    e.preventDefault();
    send();
  }
});
</script>

</body>
</html>
