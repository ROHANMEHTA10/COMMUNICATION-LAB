<!DOCTYPE html>
<html>
<head>
<title>AI Trainer</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #0d1117;
  color: white;
  display: flex;
  flex-direction: column;
  height: 100vh;
}

.header {
  padding: 15px;
  background: #161b22;
  text-align: center;
  font-weight: bold;
}

.chat-box {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
}

.message {
  padding: 12px;
  margin: 10px 0;
  border-radius: 10px;
  max-width: 70%;
}

.user {
  background: #238636;
  margin-left: auto;
}

.ai {
  background: #161b22;
}

.input-box {
  display: flex;
  padding: 10px;
  background: #161b22;
}

input {
  flex: 1;
  padding: 12px;
  border: none;
  outline: none;
  border-radius: 6px;
}

button {
  padding: 12px;
  background: #238636;
  border: none;
  color: white;
  cursor: pointer;
  border-radius: 6px;
}

.typing {
  opacity: 0.6;
  font-style: italic;
}
</style>
</head>

<body>

<div class="header">AI Trainer 🤖</div>

<div class="chat-box" id="chat">
  <div class="message ai">Hey 👋 Tell me your name</div>
</div>

<div class="input-box">
  <input id="input" placeholder="Type..." />
  <button onclick="send()">Send</button>
</div>

<script>

let userName = "";
let userWork = "";
let userInterest = "";
let introDone = false;

// CLEAN TEXT
function cleanText(text) {
  return text.toLowerCase().replace(/[^a-z ]/g, "").trim();
}

// EXTRACT NAME
function extractName(text) {
  let t = text.toLowerCase();

  if (t.includes("my name is")) return text.split("my name is")[1].trim().split(" ")[0];
  if (t.includes("i am")) return text.split("i am")[1].trim().split(" ")[0];

  return text.split(" ")[0];
}

// DETECT TYPE
function detectType(text) {
  let t = text.toLowerCase();

  if (t.includes("student") || t.includes("study") || t.includes("job") || t.includes("work")) return "work";
  if (t.includes("like") || t.includes("love") || t.includes("football") || t.includes("music") || t.includes("gym")) return "interest";
  return "unknown";
}

// SEND
function send() {
  let input = document.getElementById("input");
  let text = input.value.trim();
  let lower = cleanText(text);

  if (!text) return;

  let chat = document.getElementById("chat");

  chat.innerHTML += `<div class="message user">${text}</div>`;
  input.value = "";

  let typing = document.createElement("div");
  typing.className = "message ai typing";
  typing.innerText = "Typing...";
  chat.appendChild(typing);

  chat.scrollTop = chat.scrollHeight;

  setTimeout(() => {

    typing.remove();
    let reply = "";

    // 🚫 BAD WORDS
    if (lower.includes("hate") || lower.includes("stupid") || lower.includes("idiot") || lower.includes("fuck")) {
      reply = "😐 Keep it respectful. Answer properly.";
    }

    // 🧠 AUTO DETECT (SMART PART)
    else {

      let type = detectType(text);

      // NAME
      if (!userName) {
        userName = extractName(text);
        reply = `Nice to meet you ${userName} 😊 Tell me what you do or what you like.`;
      }

      // WORK
      else if (!userWork && type === "work") {
        userWork = text;
        reply = "Nice 👍 What are your interests?";
      }

      // INTEREST
      else if (!userInterest && type === "interest") {
        userInterest = text;
        introDone = true;

        reply = `
🔥 Your intro:<br><br>
Hi, I am ${userName}. I am ${userWork || "a learner"}. I like ${userInterest}.<br><br>

🎉 Level 1 Complete!<br>
Type <b>next</b> for Level 2 🚀
        `;
      }

      // IF USER SKIPS STEPS
      else if (!userWork) {
        reply = "🤔 Tell me what you do (student/job)";
      }

      else if (!userInterest) {
        reply = "🤔 Tell me your interests (football, music, etc)";
      }

      // 🎯 AFTER COMPLETE
      else {

        if (lower.includes("next")) {
          reply = "🚀 Level 2: Small Talk<br>Ask me: How are you?";
        }

        else if (lower.includes("how are you")) {
          reply = "I'm good 😄 What about you?";
        }

        else if (text.length < 5) {
          reply = "🤔 Speak properly… full sentence.";
        }

        else {
          reply = `👍 Nice ${userName}, you're improving.`;
        }
      }

    }

    chat.innerHTML += `<div class="message ai">${reply}</div>`;
    chat.scrollTop = chat.scrollHeight;

  }, 600);
}

// ENTER KEY
document.getElementById("input").addEventListener("keydown", function(e) {
  if (e.key === "Enter") {
    e.preventDefault();
    send();
  }
});

</script>
</body>
</html>
