<!DOCTYPE html>
<html>
<head>
<title>AI Chat - Step 1</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #0d1117;
  color: white;
  display: flex;
  flex-direction: column;
  height: 100vh;
}

/* HEADER */
.header {
  padding: 15px;
  background: #161b22;
  text-align: center;
  font-weight: bold;
}

/* CHAT AREA */
.chat-box {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
}

/* MESSAGE STYLE */
.message {
  padding: 12px 16px;
  margin: 10px 0;
  border-radius: 15px;
  max-width: 70%;
  animation: fadeIn 0.3s ease;
}

.user {
  background: #238636;
  margin-left: auto;
}

.ai {
  background: #161b22;
}

/* INPUT AREA */
.input-box {
  display: flex;
  padding: 10px;
  background: #161b22;
}

input {
  flex: 1;
  padding: 12px;
  border: none;
  outline: none;
  border-radius: 10px;
}

button {
  margin-left: 10px;
  padding: 12px 18px;
  background: #238636;
  border: none;
  color: white;
  border-radius: 10px;
  cursor: pointer;
}

/* TYPING ANIMATION */
.typing {
  font-style: italic;
  opacity: 0.7;
}

/* ANIMATION */
@keyframes fadeIn {
  from {opacity: 0; transform: translateY(10px);}
  to {opacity: 1; transform: translateY(0);}
}
</style>
</head>

<body>

<div class="header">AI Communication Trainer 🤖</div>

<div class="chat-box" id="chat">
  <div class="message ai">
    Hey 👋 I am your friend.<br>
    Tell me your name 😊
  </div>
</div>

<div class="input-box">
  <input id="input" placeholder="Type your message..." />
  <button onclick="send()">Send</button>
</div>

<script>
let step = 1;

function send() {
  let input = document.getElementById("input");
  let text = input.value.trim();

  if (text === "") return;

  let chat = document.getElementById("chat");

  // user message
  chat.innerHTML += `<div class="message user">${text}</div>`;
  input.value = "";

  // typing effect
  let typingDiv = document.createElement("div");
  typingDiv.className = "message ai typing";
  typingDiv.innerText = "Typing...";
  chat.appendChild(typingDiv);

  chat.scrollTop = chat.scrollHeight;

  setTimeout(() => {
    typingDiv.remove();

    let reply = "";

    if (text.toLowerCase().includes("bad") || text.toLowerCase().includes("abuse")) {
      reply = "😅 Bro chill… let’s keep it respectful.";
    }

    else {
      if (step === 1) {
        reply = `Nice to meet you, ${text} 😊<br>What do you do?`;
        step = 2;
      }
      else if (step === 2) {
        reply = "Good 👍 Tell me your interests or hobbies.";
        step = 3;
      }
      else if (step === 3) {
        reply = "🔥 Perfect! Example:<br>Hi, I am " + text + ". I am a student and I like football.";
        step = 4;
      }
      else {
        reply = "Keep practicing 💪 You are improving!";
      }
    }

    chat.innerHTML += `<div class="message ai">${reply}</div>`;
    chat.scrollTop = chat.scrollHeight;

  }, 1000);
}

// ENTER KEY SEND
window.onload = function() {
  document.getElementById("input").addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
      send();
    }
  });
};
</script>

</body>
</html>
