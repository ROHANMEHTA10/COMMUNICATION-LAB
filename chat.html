<!DOCTYPE html>
<html>
<head>
<title>AI Trainer</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #0d1117;
  color: white;
  display: flex;
  flex-direction: column;
  height: 100vh;
}

.header {
  padding: 15px;
  background: #161b22;
  text-align: center;
  font-weight: bold;
}

.chat-box {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
}

.message {
  padding: 12px;
  margin: 10px 0;
  border-radius: 10px;
  max-width: 70%;
}

.user {
  background: #238636;
  margin-left: auto;
}

.ai {
  background: #161b22;
}

.input-box {
  display: flex;
  padding: 10px;
  background: #161b22;
}

input {
  flex: 1;
  padding: 12px;
  border: none;
  outline: none;
}

button {
  padding: 12px;
  background: #238636;
  border: none;
  color: white;
  cursor: pointer;
}

.typing {
  opacity: 0.6;
  font-style: italic;
}
</style>
</head>

<body>

<div class="header">AI Trainer 🤖</div>

<div class="chat-box" id="chat">
  <div class="message ai">Hey 👋 Tell me your name</div>
</div>

<div class="input-box">
  <input id="input" placeholder="Type..." />
  <button onclick="send()">Send</button>
</div>

<script>
let userName = "";
let userWork = "";
let userInterest = "";
let introDone = false;

// CLEAN TEXT
function cleanText(text) {
  return text.toLowerCase().replace(/[^a-z ]/g, "").trim();
}

// NAME EXTRACT
function extractName(text) {
  let t = text.toLowerCase();

  if (t.includes("my name is")) {
    return text.split("my name is")[1].trim().split(" ")[0];
  }

  if (t.includes("i am")) {
    return text.split("i am")[1].trim().split(" ")[0];
  }

  return text.split(" ")[0];
}

// VALIDATION
function isName(text) {
  return text.split(" ").length <= 3;
}

function isWork(text) {
  return text.length > 3 && !text.toLowerCase().includes("nothing");
}

function isInterest(text) {
  return text.length > 3 && !text.toLowerCase().includes("nothing");
}

// RANDOM REPLY
function randomReply(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

// MAIN FUNCTION
function send() {
  let input = document.getElementById("input");
  let text = input.value.trim();
  let lower = cleanText(text);

  if (!text) return;

  let chat = document.getElementById("chat");

  // USER MESSAGE
  chat.innerHTML += `<div class="message user">${text}</div>`;
  input.value = "";

  // TYPING EFFECT
  let typing = document.createElement("div");
  typing.className = "message ai typing";
  typing.innerText = "Typing...";
  chat.appendChild(typing);

  chat.scrollTop = chat.scrollHeight;

  setTimeout(() => {
    typing.remove();

    let reply = "";

    // 🚫 ABUSE
    if (lower.includes("fuck") || lower.includes("stupid")) {
      reply = "😅 Chill bro… keep it respectful.";
    }

    // 🧠 NAME
    else if (!userName) {
      if (!isName(text)) {
        reply = "🤔 That doesn't look like a name. Try: 'My name is Rohan'";
      } else {
        userName = extractName(text);
        reply = `Nice to meet you ${userName} 😊 What do you do?`;
      }
    }

    // 🧠 WORK
    else if (!userWork) {
      if (!isWork(text)) {
        reply = "😅 Don't say 'nothing'. Try: student / learning coding / etc.";
      } else {
        userWork = text;
        reply = randomReply([
          "Nice 👍 What are your interests?",
          "Good 👌 What do you like doing?",
          "Cool 😎 Tell me your hobbies"
        ]);
      }
    }

    // 🧠 INTEREST
    else if (!userInterest) {
      if (!isInterest(text)) {
        reply = "🤔 Tell real interest like football, music, gym.";
      } else {
        userInterest = text;
        introDone = true;

        reply = `
🔥 Your intro:<br><br>
Hi, I am ${userName}. I am ${userWork}. I like ${userInterest}.<br><br>

🎉 Level 1 Complete!<br>
Type <b>next</b> for Level 2 🚀
        `;
      }
    }

    // 🎯 AFTER INTRO
    else {

      if (lower.includes("next")) {
        reply = "🚀 Level 2: Small Talk<br>Ask me: 'How are you?' or 'What’s up?'";
      }

      else if (lower.includes("how are you")) {
        reply = "I'm good 😄 What about you?";
      }

      else if (lower.includes("nothing")) {
        reply = "😅 Bro say something interesting… what you did today?";
      }

      else if (text.length < 5) {
        reply = "🤔 Say full sentence bro… don't be lazy 😄";
      }

      else {
        reply = randomReply([
          "Nice 👍 keep going!",
          "Good sentence 👌",
          "You're improving 💪",
          "That’s better 🔥"
        ]);
      }
    }

    chat.innerHTML += `<div class="message ai">${reply}</div>`;
    chat.scrollTop = chat.scrollHeight;

  }, 600);
}

// ENTER KEY FIX
document.getElementById("input").addEventListener("keydown", function(e) {
  if (e.key === "Enter") {
    e.preventDefault();
    send();
  }
});
</script>

</body>
</html>
