<!DOCTYPE html>
<html>
<head>
<title>AI Chat</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #0d1117;
  color: white;
  display: flex;
  flex-direction: column;
  height: 100vh;
}

.header {
  padding: 15px;
  background: #161b22;
  text-align: center;
  font-weight: bold;
}

.chat-box {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
}

.message {
  padding: 12px;
  margin: 10px 0;
  border-radius: 10px;
  max-width: 70%;
}

.user {
  background: #238636;
  margin-left: auto;
}

.ai {
  background: #161b22;
}

.input-box {
  display: flex;
  padding: 10px;
  background: #161b22;
}

input {
  flex: 1;
  padding: 12px;
  border: none;
  outline: none;
}

button {
  padding: 12px;
  background: #238636;
  border: none;
  color: white;
  cursor: pointer;
}

.typing {
  opacity: 0.6;
  font-style: italic;
}
</style>
</head>

<body>

<div class="header">AI Trainer 🤖</div>

<div class="chat-box" id="chat">
  <div class="message ai">Hey 👋 Tell me your name</div>
</div>

<div class="input-box">
  <input id="input" placeholder="Type..." />
  <button onclick="send()">Send</button>
</div>

<script>
let mode = "intro";   // intro → smalltalk
let level = 1;

// LEVEL 1 DATA
let userName = "";
let userWork = "";
let userInterest = "";

// LEVEL 2 DATA
let smallTalkStep = 1;
let convoCount = 0;

function clean(text){
  return text.toLowerCase();
}

function send(){
  let input = document.getElementById("input");
  let text = input.value.trim();
  let lower = clean(text);

  if(!text) return;

  let chat = document.getElementById("chat");

  chat.innerHTML += `<div class="message user">${text}</div>`;
  input.value = "";

  let typing = document.createElement("div");
  typing.className = "message ai typing";
  typing.innerText = "Typing...";
  chat.appendChild(typing);

  chat.scrollTop = chat.scrollHeight;

  setTimeout(()=>{

    typing.remove();
    let reply = "";

    // =========================
    // 🔵 LEVEL 1 (INTRO)
    // =========================
    if(mode === "intro"){

      if(!userName){
        userName = text.split(" ")[0];
        reply = `Nice to meet you ${userName} 😊 What do you do?`;
      }

      else if(!userWork){
        userWork = text;
        reply = "Good 👍 What are your interests?";
      }

      else if(!userInterest){
        userInterest = text;

        reply = `
🔥 Your intro:<br><br>
Hi, I am ${userName}. I am ${userWork}. I like ${userInterest}.<br><br>

🎉 Level 1 Complete!<br>
Type <b>next</b> to start Small Talk 🚀
        `;
      }

      else{
        if(lower.includes("next")){
          mode = "smalltalk";
          level = 2;

          reply = `
🎭 Level 2: Small Talk<br><br>
Situation: You meet a new student in college.<br>
👉 Start conversation (say hi)
          `;
        }
        else{
          reply = "Type 'next' to continue 🚀";
        }
      }
    }

    // =========================
    // 🟣 LEVEL 2 (SMALL TALK)
    // =========================
    else if(mode === "smalltalk"){

      // STEP 1: GREETING
      if(smallTalkStep === 1){

        if(lower.includes("hi") || lower.includes("hello")){
          smallTalkStep = 2;
          reply = "Nice start 👍 Now ask me a question.";
        }
        else{
          reply = "Start with greeting like 'Hi' or 'Hello'";
        }
      }

      // STEP 2: QUESTION
      else if(smallTalkStep === 2){

        if(text.includes("?") || lower.includes("how") || lower.includes("what")){
          smallTalkStep = 3;
          reply = "I'm good 😄 I'm a designer. What about you?";
        }
        else{
          reply = "Ask a question (example: How are you?)";
        }
      }

      // STEP 3: CONTINUE CONVO
      else if(smallTalkStep === 3){

        convoCount++;

        const replies = [
          "Nice 👍 that's interesting!",
          "Oh cool 😄 tell me more",
          "Good one 💪 what else?",
          "Haha okay 😂"
        ];

        reply = replies[Math.floor(Math.random()*replies.length)];

        // END AFTER 3 TURNS
        if(convoCount >= 3){
          reply += `
<br><br>🎉 Level 2 Complete!<br>
You can handle small talk 😄<br>
Type <b>next</b> for next level 🚀
          `;
          smallTalkStep = 4;
        }
      }

      // AFTER COMPLETE
      else if(smallTalkStep === 4){

        if(lower.includes("next")){
          reply = "🚀 Level 3 (Confidence Training) coming soon...";
        }
        else{
          reply = "Type 'next' to continue 🚀";
        }
      }
    }

    chat.innerHTML += `<div class="message ai">${reply}</div>`;
    chat.scrollTop = chat.scrollHeight;

  },600);
}

// ENTER KEY
document.getElementById("input").addEventListener("keydown", function(e){
  if(e.key === "Enter"){
    e.preventDefault();
    send();
  }
});
</script>
</html>
