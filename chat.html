<script>
let userName = "";
let userWork = "";
let userInterest = "";
let introDone = false;

function cleanText(text) {
  return text.toLowerCase().replace(/[^a-z ]/g, "").trim();
}

function extractName(text) {
  let t = text.toLowerCase();

  if (t.includes("my name is")) {
    return text.split("my name is")[1].trim().split(" ")[0];
  }

  if (t.includes("i am")) {
    return text.split("i am")[1].trim().split(" ")[0];
  }

  return text.split(" ")[0];
}

function send() {
  let input = document.getElementById("input");
  let text = input.value.trim();
  let lower = cleanText(text);

  if (!text) return;

  let chat = document.getElementById("chat");

  // USER MESSAGE
  chat.innerHTML += `<div class="message user">${text}</div>`;
  input.value = "";

  // TYPING EFFECT
  let typing = document.createElement("div");
  typing.className = "message ai typing";
  typing.innerText = "Typing...";
  chat.appendChild(typing);

  chat.scrollTop = chat.scrollHeight;

  // ✅ IMPORTANT: RESPONSE DELAY
  setTimeout(() => {

    typing.remove();

    let reply = "";

    // 🚫 BAD WORDS
    if (
      lower.includes("hate") ||
      lower.includes("stupid") ||
      lower.includes("idiot") ||
      lower.includes("fuck")
    ) {
      reply = "😐 That’s not appropriate. Give a proper answer.";
    }

    // 🧠 NAME
    else if (!userName) {
      if (lower === "hi" || lower === "hello" || text.length < 2) {
        reply = "🤔 That’s not your name. Try: 'My name is Rohan'";
      } else {
        userName = extractName(text);
        reply = `Nice to meet you ${userName} 😊 What do you do?`;
      }
    }

    // 🧠 WORK
    else if (!userWork) {
      if (
        lower.includes("nothing") ||
        lower.length < 4 ||
        lower === userName.toLowerCase()
      ) {
        reply = "😅 Give a real answer like: student, learning coding, etc.";
      } else {
        userWork = text;
        reply = "Good 👍 What are your interests?";
      }
    }

    // 🧠 INTEREST
    else if (!userInterest) {
      if (
        lower.includes("nothing") ||
        lower.includes("hate") ||
        lower.length < 3 ||
        lower === userName.toLowerCase()
      ) {
        reply = "🤔 That’s not a valid interest. Try: football, music, gym.";
      } else {
        userInterest = text;
        introDone = true;

        reply = `
🔥 Your intro:<br><br>
Hi, I am ${userName}. I am ${userWork}. I like ${userInterest}.<br><br>

🎉 Level 1 Complete!<br>
Type <b>next</b> for Level 2 🚀
        `;
      }
    }

    // 🎯 AFTER COMPLETE
    else {

      if (lower.includes("next")) {
        reply = "🚀 Level 2: Small Talk<br>Ask: How are you?";
      }

      else if (lower.includes("how are you")) {
        reply = "I'm good 😄 What about you?";
      }

      else if (lower.includes("nothing")) {
        reply = "😅 Say something meaningful bro.";
      }

      else if (text.length < 5) {
        reply = "🤔 Speak properly… full sentence.";
      }

      else {
        reply = "👍 Good, keep practicing!";
      }

    }

    // ✅ SHOW AI MESSAGE
    chat.innerHTML += `<div class="message ai">${reply}</div>`;
    chat.scrollTop = chat.scrollHeight;

  }, 600);
}

// ENTER KEY
document.getElementById("input").addEventListener("keydown", function(e) {
  if (e.key === "Enter") {
    e.preventDefault();
    send();
  }
});
</script>
