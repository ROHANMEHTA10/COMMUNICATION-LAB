<script>

// ENTER KEY FIX
window.onload = function() {
  document.getElementById("input").addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
      send();
    }
  });
};

// STEP SYSTEM (SMART FLOW)
let step = 1;

function send() {
  let input = document.getElementById("input");
  let text = input.value.trim();

  if(text === "") return;

  let chat = document.getElementById("chat");

  // user message
  chat.innerHTML += `<div class="message user">${text}</div>`;
  input.value = "";

  let reply = "";

  // FILTER BAD WORDS
  if(text.toLowerCase().includes("bad") || text.toLowerCase().includes("abuse")) {
    reply = "😅 Bro chill... let's keep it respectful.";
  }
  else {
    // STEP FLOW
    if(step === 1) {
      reply = `Nice to meet you, ${text} 😊<br>What do you do?`;
      step = 2;
    }
    else if(step === 2) {
      reply = "Good 👍 Now tell me your interests or hobbies.";
      step = 3;
    }
    else if(step === 3) {
      reply = "🔥 Perfect! Example:<br>Hi, I am Rohan. I am a student and I like football.";
      step = 4;
    }
    else {
      reply = "Keep practicing 💪";
    }
  }

  setTimeout(() => {
    chat.innerHTML += `<div class="message ai">${reply}</div>`;
    chat.scrollTop = chat.scrollHeight;
  }, 600);
}

</script>
